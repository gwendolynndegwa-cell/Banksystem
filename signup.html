<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenBank - Create Account</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="signup-page">
    <div class="signup-background">
        <div class="animated-bg"></div>
    </div>

    <div class="signup-container">
        <button class="back-btn" onclick="navigateToLogin()">
            <i class="fas fa-arrow-left"></i> Back
        </button>

        <div class="signup-box">
            <div class="signup-header">
                <div class="logo">
                    <i class="fas fa-leaf"></i>
                    <h1>GreenBank</h1>
                </div>
                <p class="tagline">Create Your Account & Get Instant Loans</p>
            </div>

            <form id="signupForm" class="signup-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">
                            <i class="fas fa-user"></i> First Name
                        </label>
                        <input 
                            type="text" 
                            id="firstName" 
                            placeholder="John"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="lastName">
                            <i class="fas fa-user"></i> Last Name
                        </label>
                        <input 
                            type="text" 
                            id="lastName" 
                            placeholder="Doe"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupEmail">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input 
                        type="email" 
                        id="signupEmail" 
                        placeholder="you@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="phone">
                        <i class="fas fa-phone"></i> Phone Number
                    </label>
                    <input 
                        type="tel" 
                        id="phone" 
                        placeholder="+1 (555) 000-0000"
                        required
                    >
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dateOfBirth">
                            <i class="fas fa-birthday-cake"></i> Date of Birth
                        </label>
                        <input 
                            type="date" 
                            id="dateOfBirth"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="idNumber">
                            <i class="fas fa-id-card"></i> ID Number
                        </label>
                        <input 
                            type="text" 
                            id="idNumber" 
                            placeholder="1234567890"
                            required
                        >
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="annualIncome">
                            <i class="fas fa-money-bill-wave"></i> Annual Income
                        </label>
                        <input 
                            type="number" 
                            id="annualIncome" 
                            placeholder="50000"
                            min="0"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="employment">
                            <i class="fas fa-briefcase"></i> Employment Status
                        </label>
                        <select id="employment" required>
                            <option value="">Select Status</option>
                            <option value="employed">Employed</option>
                            <option value="self-employed">Self-Employed</option>
                            <option value="retired">Retired</option>
                            <option value="student">Student</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="creditScore">
                            <i class="fas fa-star"></i> Credit Score (500-700)
                        </label>
                        <input 
                            type="number" 
                            id="creditScore" 
                            placeholder="650"
                            min="500"
                            max="700"
                            step="1"
                            required
                        >
                        <small style="color: var(--text-light); display: block; margin-top: 5px;">
                            <i class="fas fa-info-circle"></i> Enter a score between 500-700
                        </small>
                    </div>
                    <div class="form-group">
                        <label for="creditScoreSlider">
                            <i class="fas fa-sliders-h"></i> Adjust Slider
                        </label>
                        <input type="range" id="creditScoreSlider" min="500" max="700" value="650" style="width: 100%;">
                        <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-light); margin-top: 5px;">
                            <span>500 (Low)</span>
                            <span id="sliderValue">650</span>
                            <span>700 (High)</span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupPassword">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input 
                        type="password" 
                        id="signupPassword" 
                        placeholder="Min. 8 characters"
                        required
                    >
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <small id="passwordHint">Password strength: <span id="strengthText">Weak</span></small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-lock"></i> Confirm Password
                    </label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        placeholder="Re-enter password"
                        required
                    >
                </div>

                <label class="terms-checkbox">
                    <input type="checkbox" name="terms" required>
                    <span>I agree to the <strong>Terms & Conditions</strong></span>
                </label>

                <button type="submit" class="btn btn-register">
                    <i class="fas fa-check-circle"></i> CREATE ACCOUNT
                </button>

                <div class="login-link">
                    Already have an account? <a href="index.html">Login here</a>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
