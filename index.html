<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenBank - Quick Loan Approval System</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-background">
        <div class="geometric-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-leaf"></i>
                    <h1>GreenBank</h1>
                </div>
                <p class="tagline">Instant Loan Approval System</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="loginEmail">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input 
                        type="email" 
                        id="loginEmail" 
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="loginPassword">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input 
                        type="password" 
                        id="loginPassword" 
                        placeholder="Enter your password"
                        required
                    >
                    <span class="toggle-password" onclick="togglePassword('loginPassword')">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>

                <div class="remember-forgot">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-login">
                    <i class="fas fa-sign-in-alt"></i> LOGIN
                </button>

                <div class="divider">
                    <span>or</span>
                </div>

                <button type="button" class="btn btn-signup" onclick="navigateToSignup()">
                    <i class="fas fa-user-plus"></i> CREATE NEW ACCOUNT
                </button>
            </form>

            <div class="login-features">
                <div class="feature">
                    <i class="fas fa-bolt"></i>
                    <p>Instant Approval</p>
                </div>
                <div class="feature">
                    <i class="fas fa-shield-alt"></i>
                    <p>100% Secure</p>
                </div>
                <div class="feature">
                    <i class="fas fa-clock"></i>
                    <p>24/7 Support</p>
                </div>
            </div>
        </div>

        <div class="login-info">
            <div class="info-card">
                <h3>Why Choose GreenBank?</h3>
                <ul>
                    <li><i class="fas fa-check-circle"></i> Fast Processing</li>
                    <li><i class="fas fa-check-circle"></i> Low Interest Rates</li>
                    <li><i class="fas fa-check-circle"></i> Flexible Terms</li>
                    <li><i class="fas fa-check-circle"></i> Easy Documentation</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
