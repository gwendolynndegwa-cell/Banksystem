<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankLoan Pro - Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="logo-section">
                <h1>🏦 BankLoan Pro</h1>
                <p>Join Us Today & Get Instant Loan Approval</p>
            </div>

            <form id="signupForm" class="form-box">
                <h2>Create Your Account</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input 
                            type="text" 
                            id="firstName" 
                            name="firstName" 
                            placeholder="John"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input 
                            type="text" 
                            id="lastName" 
                            name="lastName" 
                            placeholder="Doe"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email Address</label>
                    <input 
                        type="email" 
                        id="signupEmail" 
                        name="signupEmail" 
                        placeholder="you@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        placeholder="+1 (555) 000-0000"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="idNumber">ID Number (Passport/License)</label>
                    <input 
                        type="text" 
                        id="idNumber" 
                        name="idNumber" 
                        placeholder="Enter your ID number"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="income">Annual Income</label>
                    <input 
                        type="number" 
                        id="income" 
                        name="income" 
                        placeholder="50000"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input 
                        type="password" 
                        id="signupPassword" 
                        name="signupPassword" 
                        placeholder="Min. 8 characters"
                        required
                    >
                    <span class="password-strength" id="passwordStrength"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="Re-enter your password"
                        required
                    >
                </div>

                <label class="terms">
                    <input type="checkbox" name="terms" required>
                    I agree to the Terms & Conditions
                </label>

                <button type="submit" class="btn btn-primary">CREATE ACCOUNT</button>

                <div class="divider">OR</div>

                <button type="button" class="btn btn-secondary" onclick="navigateToLogin()">
                    Back to Login
                </button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
